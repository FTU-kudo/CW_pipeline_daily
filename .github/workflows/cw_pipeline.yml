name: CW Pipeline - YSVN

on:
  workflow_dispatch:
  # Tu dong chay 16:30 ICT (09:30 UTC) thu 2 - thu 6
  schedule:
    - cron: '30 9 * * 1-5'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    permissions:
      contents: write

    steps:
      - name: Checkout repo (kem ca cache da commit)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4 openpyxl vnstock pyarrow

      - name: Run pipeline
        env:
          VNSTOCK_API: ${{ secrets.VNSTOCK_API }}
        run: |
          mkdir -p output/cache
          python pipeline.py

      - name: Commit cache + Excel vao repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet \
            && echo "Khong co thay doi moi." \
            || git commit -m "update: CW data $(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload Excel as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cw-master-${{ github.run_number }}
          path: output/cw_master.xlsx
          retention-days: 30
