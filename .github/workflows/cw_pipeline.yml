name: CW Pipeline – YSVN

on:
  # ── Chạy thủ công từ GitHub UI ──────────────────────────────────
  workflow_dispatch:

  # ── Tự động lúc 22:00 (GMT+7 = 15:00 UTC) mỗi ngày ─────────────
  # Bỏ comment dòng dưới nếu muốn chạy hàng đêm tự động
  # schedule:
  #   - cron: '0 15 * * 1-5'   # Thứ 2–6, 22:00 ICT

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180       # Tối đa 3 tiếng (pipeline ~2 tiếng)

    permissions:
      contents: write          # Cần để commit file Excel vào repo

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Cài Python ───────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Cài thư viện ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas beautifulsoup4 openpyxl vnstock

      # ── 4. Chạy pipeline ────────────────────────────────────────
      - name: Run CW pipeline
        env:
          VNSTOCK_API: ${{ secrets.VNSTOCK_API }}
        run: |
          mkdir -p output
          python pipeline.py

      # ── 5. Commit file Excel vào repo ───────────────────────────
      - name: Commit output Excel to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet && echo "Không có file mới." || \
            git commit -m "📊 CW Pipeline output – $(date +'%Y-%m-%d')"
          git push

      # ── 6. Upload file Excel làm Artifact (tải trực tiếp) ───────
      - name: Upload Excel as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CW-Pipeline-Output
          path: output/*.xlsx
          retention-days: 30    # Giữ artifact 30 ngày
