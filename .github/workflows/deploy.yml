name: Deploy to GitHub Pages (Manual)

on:
  workflow_dispatch:        # Cho phép chạy thủ công từ Actions
  push:
    branches:
      - gh-pages            # Tự động chạy khi có push lên gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages      # Lấy nội dung từ branch gh-pages

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .            # Toàn bộ nội dung của gh-pages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
